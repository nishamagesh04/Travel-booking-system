<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Place</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h4 class="text-center mb-4">Edit Place</h4>
            <form method="POST" action="/edit_place/{{ place.id }}">
                <div class="mb-3">
                    <label class="form-label">Place Name</label>
                    <input type="text" name="place_name" class="form-control" value="{{ place.place_name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Region</label>
                    <select name="region" class="form-select" required>
                        <option {% if place.region == 'North India' %}selected{% endif %}>North India</option>
                        <option {% if place.region == 'South India' %}selected{% endif %}>South India</option>
                        <option {% if place.region == 'East India' %}selected{% endif %}>East India</option>
                        <option {% if place.region == 'West India' %}selected{% endif %}>West India</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Min Days</label>
                    <input type="number" name="min_days" class="form-control" value="{{ place.min_days }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Max Days</label>
                    <input type="number" name="max_days" class="form-control" value="{{ place.max_days }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ place.description }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Place</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
