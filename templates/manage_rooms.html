<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms - {{ owner.name }}</title>
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Modern CSS Framework -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            min-height: 100vh;
        }
        
        .rooms-container {
            padding: 40px 0;
        }
        
        .room-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.8s ease-out;
        }
        
        .room-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-card {
            background: rgba(102, 126, 234, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-modern">
    <div class="container">
        <a href="/hotel_dashboard" class="navbar-brand-modern">
            <i class="fas fa-hotel me-2"></i>
            {{ owner.name }}'s Dashboard
        </a>
        <a href="/hotel_dashboard" class="btn btn-outline-modern btn-modern">
            <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
        </a>
    </div>
</nav>

<!-- ROOMS CONTENT -->
<div class="container rooms-container">
    
    <div class="room-card">
        <h2 class="mb-4">
            <i class="fas fa-bed me-2"></i>
            Manage Rooms - {{ hotel.hotel_name }}
        </h2>
        
        <div class="room-stats">
            <div class="stat-card">
                <div class="stat-number">{{ hotel.total_rooms }}</div>
                <div class="stat-label">Total Rooms</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">{{ hotel.available_rooms }}</div>
                <div class="stat-label">Available Rooms</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">{{ hotel.total_rooms - hotel.available_rooms }}</div>
                <div class="stat-label">Occupied Rooms</div>
            </div>
        </div>
        
        <form method="POST" action="/update_rooms" class="mt-4">
            <div class="row">
                <div class="col-md-6">
                    <label for="total_rooms" class="form-label">Total Rooms</label>
                    <input type="number" name="total_rooms" id="total_rooms" 
                           class="form-control-modern" value="{{ hotel.total_rooms }}" 
                           min="1" required>
                </div>
                <div class="col-md-6">
                    <label for="available_rooms" class="form-label">Available Rooms</label>
                    <input type="number" name="available_rooms" id="available_rooms" 
                           class="form-control-modern" value="{{ hotel.available_rooms }}" 
                           min="0" max="{{ hotel.total_rooms }}" required>
                </div>
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn btn-primary-modern btn-modern">
                    <i class="fas fa-save me-2"></i>Update Room Information
                </button>
                <a href="/hotel_dashboard" class="btn btn-outline-modern btn-modern ms-2">
                    <i class="fas fa-times me-2"></i>Cancel
                </a>
            </div>
        </form>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
