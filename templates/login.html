<!DOCTYPE html>
<html>
<head>
<title>User Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#000;color:white;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Segoe UI;}
.brand{position:absolute;top:30px;font-size:30px;color:#00c6ff;font-weight:bold;}
.box{width:400px;background:rgba(255,255,255,0.1);padding:30px;border-radius:15px;}
h3{text-align:center;color:#ffc107;margin-bottom:20px;}
.form-control{background:#d9dde3;border:none;margin-top:10px;}
.btn-main{width:100%;margin-top:15px;background:#ffc107;border:none;}
.link{text-align:center;margin-top:15px;}
.link a{color:#00c6ff;text-decoration:none;}
</style>
</head>

<body>
<div class="brand">TravelEase</div>

<div class="box">
<h3>User Login</h3>
<form method="POST" action="/login">
<input type="email" name="email" class="form-control" placeholder="Email" required>
<input type="password" name="password" class="form-control" placeholder="Password" required>
<button class="btn btn-main">Login</button>
</form>

<div class="link">
<a href="/signup">Create Account</a>
</div>
</div>
</body>
</html>
