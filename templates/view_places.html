<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Places</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3>All Places</h3>
    <table class="table table-bordered mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Place Name</th>
                <th>Region</th>
                <th>Min Days</th>
                <th>Max Days</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for p in places %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.place_name }}</td>
                <td>{{ p.region }}</td>
                <td>{{ p.min_days }}</td>
                <td>{{ p.max_days }}</td>
                <td>{{ p.description }}</td>
                <td>
                    <a href="/edit_place/{{ p.id }}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="/delete_place/{{ p.id }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
