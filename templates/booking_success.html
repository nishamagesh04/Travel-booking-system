<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .success-card {
            border-radius: 20px;
        }
        .success-icon {
            font-size: 70px;
            color: #28a745;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-lg p-5 text-center success-card">

        <div class="mb-3">
            <i class="bi bi-check-circle-fill success-icon"></i>
        </div>

        <h3 class="text-success mb-2">Booking Confirmed!</h3>

        <p class="text-muted">
            Your travel booking has been successfully completed.
        </p>

        <hr>

        <p>
            Our team will contact you shortly with further details.
        </p>

        <div class="mt-4">
            <a href="/dashboard" class="btn btn-primary px-4">
                <i class="bi bi-house-door"></i> Go to Dashboard
            </a>

            <a href="/my_bookings" class="btn btn-outline-secondary px-4 ms-2">
                <i class="bi bi-journal-text"></i> My Bookings
            </a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
