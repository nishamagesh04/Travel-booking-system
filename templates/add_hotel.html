<!DOCTYPE html>
<html>
<head>
  <title>Add / Update Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 col-md-6">
  <h3>Add / Update Hotel</h3>

  <form method="POST" enctype="multipart/form-data">

    <input name="hotel_name" class="form-control mb-3" placeholder="Hotel Name" required>
    <input name="place_name" class="form-control mb-3" placeholder="Place" required>
    <input name="spot_name" class="form-control mb-3" placeholder="Spot" required>

    <textarea name="address" class="form-control mb-3" placeholder="Address" required></textarea>

    <!-- ✅ Price: text (accepts ₹, commas, words) -->
    <input name="price" type="text" class="form-control mb-3"
           placeholder="Price per Night (ex: 2500, 2,500, ₹2500, Rs. 2500)"
           required>

    <input name="rooms" type="number" class="form-control mb-3" placeholder="Total Rooms" required>

    <button class="btn btn-success">Submit</button>
    <a href="/hotel_dashboard" class="btn btn-secondary">Back</a>

  </form>
</div>

<!-- ✅ Optional JS: cleans value on blur (before submit) -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const price = document.querySelector('input[name="price"]');

    price.addEventListener("blur", () => {
      let v = price.value || "";

      // remove ₹ symbol
      v = v.replace(/₹/g, "");

      // remove words rupee/rupees/inr/rs.
      v = v.replace(/rupees?/gi, "");
      v = v.replace(/inr/gi, "");
      v = v.replace(/rs\.?/gi, "");

      // remove spaces
      v = v.replace(/\s/g, "");

      // remove commas
      v = v.replace(/,/g, "");

      // keep digits only
      v = v.replace(/[^\d]/g, "");

      price.value = v;
    });
  });
</script>

</body>
</html>
