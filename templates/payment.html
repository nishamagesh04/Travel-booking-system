<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
        }

        .payment-card {
            max-width: 520px;
            margin: auto;
            border-radius: 18px;
        }

        .card-header {
            background: #198754;
            color: white;
            border-radius: 18px 18px 0 0;
            text-align: center;
        }

        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .btn-pay {
            background: linear-gradient(to right, #28a745, #1e7e34);
            border: none;
            border-radius: 30px;
            font-size: 18px;
        }

        .btn-pay:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container d-flex align-items-center justify-content-center">
    <div class="card payment-card shadow-lg">

        <div class="card-header p-3">
            <h4 class="mb-0">
                <i class="bi bi-credit-card-fill"></i> Payment Details
            </h4>
            <small>Secure Payment</small>
        </div>

        <div class="card-body p-4">

            <div class="info-box">
                <p class="mb-1"><strong><i class="bi bi-person-fill"></i> Name:</strong> {{ data.name }}</p>
                <p class="mb-1"><strong><i class="bi bi-envelope-fill"></i> Email:</strong> {{ data.email }}</p>
                <p class="mb-1"><strong><i class="bi bi-geo-alt-fill"></i> Place:</strong> {{ data.place }}</p>
                <p class="mb-0">
                    <strong><i class="bi bi-currency-rupee"></i> Total Amount:</strong>
                    ₹{{ data.price }}
                </p>
            </div>

            <hr>

            <h5 class="text-center mb-3">Select Payment Method</h5>

            <div class="d-grid gap-2">
                <button class="btn btn-pay py-2">
                    <i class="bi bi-lock-fill"></i> Pay Now
                </button>
            </div>

            <p class="text-center text-muted mt-3 mb-0" style="font-size: 13px;">
                <i class="bi bi-shield-check"></i> Your payment is 100% secure
            </p>
        </div>
    </div>
</div>

</body>
</html>
